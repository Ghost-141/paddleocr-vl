name: paddleocr-vl

services:
  model-setup:
    build: .
    user: root
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - models:/models
      - huggingface-cache:/root/.cache
    command: ["bash", "/app/scripts/download_models.sh"]

  paddleocr-vlm-server:
    image: ${VLLM_IMAGE:-ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-genai-vllm-server:latest-nvidia-gpu-offline}
    command:
      - paddleocr
      - genai_server
      - --model_name
      - PaddleOCR-VL-1.6-0.9B
      - --host
      - 0.0.0.0
      - --port
      - "8118"
      - --backend
      - vllm
      - --backend_config
      - /opt/paddleocr/vllm_config.yaml
    volumes:
      - ./deploy/vllm_config.yaml:/opt/paddleocr/vllm_config.yaml:ro
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8118/health || exit 1"]
      start_period: 10m
      interval: 15s
      timeout: 5s
      retries: 10

  layout:
    image: ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlex/hps:paddlex3.7-gpu
    environment:
      LAYOUT_MODEL_DIR: /models/PP-DocLayoutV3
      LAYOUT_MODEL_DEVICE: gpu
    volumes:
      - ./deploy/layout_server.py:/app/layout_server.py:ro
      - models:/models:ro
      - app-data:/data:ro
    command: ["python3", "/app/layout_server.py"]
    restart: unless-stopped
    depends_on:
      model-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090', timeout=4).close()"]
      start_period: 5m
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]

  api:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment: &app-environment
      PUBLIC_API_KEY: ${PUBLIC_API_KEY:?Set PUBLIC_API_KEY in .env}
      VLLM_URL: http://paddleocr-vlm-server:8118/v1
      VLLM_MODEL: ${VLLM_MODEL:-PaddleOCR-VL-1.6-0.9B}
      LAYOUT_URL: http://layout:8090
      DATA_DIR: /data
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-100}
      MAX_PAGES: ${MAX_PAGES:-100}
      MAX_JOBS: ${MAX_JOBS:-20}
      MAX_PAGES_PER_JOB: ${MAX_PAGES_PER_JOB:-12}
      MAX_REGIONS_PER_PAGE: ${MAX_REGIONS_PER_PAGE:-64}
      VLM_DISPATCH_CONCURRENCY: ${VLM_DISPATCH_CONCURRENCY:-32}
      VLM_CLAIM_BATCH_SIZE: ${VLM_CLAIM_BATCH_SIZE:-32}
      LEASE_SECONDS: ${LEASE_SECONDS:-900}
      MAX_RETRIES: ${MAX_RETRIES:-3}
    volumes:
      - app-data:/data
    restart: unless-stopped
    depends_on:
      paddleocr-vlm-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  layout-worker:
    build: .
    command: ["python", "-m", "paddlocr_vl.workers.layout"]
    environment: *app-environment
    volumes:
      - app-data:/data
    restart: unless-stopped
    depends_on:
      layout:
        condition: service_healthy
    deploy:
      replicas: ${LAYOUT_WORKER_REPLICAS:-6}

  vlm-worker:
    build: .
    command: ["python", "-m", "paddlocr_vl.workers.vlm"]
    environment: *app-environment
    volumes:
      - app-data:/data
    restart: unless-stopped
    depends_on:
      paddleocr-vlm-server:
        condition: service_healthy
    deploy:
      replicas: ${VLM_WORKER_REPLICAS:-4}

volumes:
  app-data:
  models:
  huggingface-cache:
